spring:
  application:
    name: Company Management System

  profiles:
    active: ${SPRING_PROFILE:dev}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true

logging:
  level:
    com.company.managementsystem: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"