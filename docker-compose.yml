version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: company_management_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-company_management_db}
      POSTGRES_USER: ${DB_USER:-companyuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-companypass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-companyuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - company-network

  # Free database management tool
  adminer:
    image: adminer:latest
    container_name: company_management_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8090}:8080"
    depends_on:
      - postgres
    networks:
      - company-network
    profiles:
      - tools

  # Alternative: pgAdmin (also free)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: company_management_pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@company.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - postgres
    networks:
      - company-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local

networks:
  company-network:
    driver: bridge